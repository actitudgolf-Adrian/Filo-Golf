function lsGet(k){try{const v=localStorage.getItem("fg_"+k);return v?JSON.parse(v):null}catch{return null}}
function lsSet(k,v){try{localStorage.setItem("fg_"+k,JSON.stringify(v));return true}catch{return false}}

async function sbGet(table,match){
  try{
    const q=Object.entries(match).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join("&");
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${q}&limit=1`,{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}});
    const data=await r.json();
    return data&&data[0]?data[0]:null;
  }catch{return null}
}

async function sbGetAll(table,match){
  try{
    const q=match?Object.entries(match).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join("&"):"";
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${q}&order=created_at.desc`,{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}});
    return await r.json();
  }catch{return []}
}

async function sbUpsert(table,data){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{
      method:"POST",
      headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
      body:JSON.stringify(data)
    });
    return r.ok;
  }catch{return false}
}

function StatCard({label,value,sub}){

  );
}

function calcStats(rounds){
  if(!rounds.length) return null;
  const n=rounds.length;
  const totalHoles=rounds.reduce((s,r)=>s+Object.keys(r.holes||{}).length,0);
  const avgGross=(rounds.reduce((s,r)=>s+(r.totalShots||0),0)/n).toFixed(1);
  const avgNeto=(rounds.reduce((s,r)=>s+((r.totalShots||0)-(r.hcp||0)),0)/n).toFixed(1);
  const best=Math.min(...rounds.map(r=>r.totalShots||999));
  const bestNeto=Math.min(...rounds.map(r=>(r.totalShots||0)-(r.hcp||0)));
  const totalPutts=rounds.reduce((s,r)=>s+(r.totalPutts||0),0);
  const totalChips=rounds.reduce((s,r)=>s+(r.totalChips||0),0);
  const totalBunker=rounds.reduce((s,r)=>s+(r.totalBunker||0),0);
  const avgPutts=(totalPutts/n).toFixed(1);
  const avgPuttsHoyo=totalHoles?(totalPutts/totalHoles).toFixed(2):"—";
  const avgChips=(totalChips/n).toFixed(1);
  const avgChipsHoyo=totalHoles?(totalChips/totalHoles).toFixed(2):"—";
  const avgBunker=(totalBunker/n).toFixed(1);
  const avgBunkerHoyo=totalHoles?(totalBunker/totalHoles).toFixed(2):"—";
  return{n,avgGross,avgNeto,best,bestNeto,avgPutts,avgPuttsHoyo,avgChips,avgChipsHoyo,avgBunker,avgBunkerHoyo};
}

function Auth({onLogin}){
  const [mode,setMode]=useState("login");

  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const upd=(k,v)=>setF(p=>({...p,[k]:v}));

  async function login(){
    setErr("");setBusy(true);
    try{
      const u=f.user.trim().toLowerCase();
      if(u===COACH_U&&f.pass===COACH_P){const c={username:"coach",name:"Adrián Mamianetti",isCoach:true};lsSet("session",c);onLogin(c);return}
      let s=await sbGet("users",{username:u});
      if(s){s={...s,pass:lsGet("pass:"+u)}}
      if(!s){s=lsGet("user:"+u)}
      if(!s){setErr("Usuario no encontrado.");return}
      if(s.pass!==f.pass){setErr("Contraseña incorrecta.");return}
      const ud={username:s.username,pass:s.pass,name:s.name,hcp:s.hcp,hcpT:s.hcpt||s.hcpT||"libre",isCoach:false};
      lsSet("session",ud);onLogin(ud);
    }catch(e){setErr("Error de conexión.");}
    finally{setBusy(false);}
  }

  async function register(){
    setErr("");setBusy(true);
    try{
      if(f.code.trim().toUpperCase()!==INVITE){setErr("Código de invitación inválido.");return}
      if(!f.user.trim()||!f.pass||!f.name.trim()){setErr("Completá todos los campos.");return}
      const u=f.user.trim().toLowerCase().replace(/\s/g,"");
      if(u===COACH_U){setErr("Ese usuario no está disponible.");return}
      const exists=await sbGet("users",{username:u});
      if(exists||lsGet("user:"+u)){setErr("Ese usuario ya existe, elegí otro.");return}
      const hcp=parseFloat(f.hcp)||18;
      const ud={username:u,pass:f.pass,name:f.name.trim(),hcp:hcp,hcpT:f.hcpT,isCoach:false,joinedAt:Date.now()};
      await sbUpsert("users",{username:u,name:ud.name,hcp:hcp,hcpt:f.hcpT,joined_at:Date.now()});
      lsSet("user:"+u,ud);
      lsSet("pass:"+u,f.pass);

    }catch(e){setErr("Error inesperado.");}
    finally{setBusy(false);}

          <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>

function NewRound({user,onSave,onCancel}){
  const [step,setStep]=useState(1);
  const [meta,setMeta]=useState({courseId:"",date:new Date().toISOString().slice(0,10),format:"Strokeplay",hcp:user.hcp||18,hcpT:user.hcpT||"libre"});
  const [holes,setHoles]=useState({});
  const [err,setErr]=useState("");
  const [saving,setSaving]=useState(false);
  const course=COURSES.find(c=>c.id===meta.courseId);
  const holeCount=course?.holes||18;
  const totalShots=Object.values(holes).reduce((s,h)=>s+(parseInt(h.shots)||0),0);
  const totalPutts=Object.values(holes).reduce((s,h)=>s+(parseInt(h.putts)||0),0);
  const totalChips=Object.values(holes).reduce((s,h)=>s+(parseInt(h.chips)||0),0);
  const totalBunker=Object.values(holes).reduce((s,h)=>s+(parseInt(h.bunker)||0),0);

  async function save(){
    if(!meta.courseId){setErr("Seleccioná una cancha.");return}
    setSaving(true);
    const id=Date.now().toString();
    const round={id,username:user.username,playerName:user.name,courseId:meta.courseId,courseName:course?.name,date:meta.date,format:meta.format,hcp:parseFloat(meta.hcp)||0,hcpT:meta.hcpT,holes,totalShots,totalPutts,totalChips,totalBunker,createdAt:Date.now()};
    lsSet("round:"+id,round);
    const idx=lsGet("rounds:"+user.username)||[];
    idx.push(id);lsSet("rounds:"+user.username,idx);
    await sbUpsert("rounds",{id,username:user.username,player_name:user.name,course_id:meta.courseId,course_name:course?.name,date:meta.date,format:meta.format,hcp:parseFloat(meta.hcp)||0,hcpt:meta.hcpT,holes:round.holes,total_shots:totalShots,total_putts:totalPutts,total_chips:totalChips,total_bunker:totalBunker,created_at:Date.now()});
    setSaving(false);
    onSave();
  }

  return(
    <div style={S.page}>
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"16px"}}>
        <button style={S.btn("g")} onClick={onCancel}>← Volver</button>
        <div style={{fontSize:"14px",color:gold,letterSpacing:"2px",textTransform:"uppercase"}}>Nueva Vuelta</div>
      </div>
      {step===1&&(
        <div style={S.card}>
          <div style={S.h2}>Datos de la vuelta</div>
          {err&&<div style={S.alt("e")}>{err}</div>}
          <label style={S.lbl}>Cancha</label>
          <select style={{...S.sel,marginBottom:"11px"}} value={meta.courseId} onChange={e=>setMeta(m=>({...m,courseId:e.target.value}))}>
            <option value="">Seleccioná una cancha</option>
            {COURSES.map(c=><option key={c.id} value={c.id}>{c.name} — {c.city}</option>)}
          </select>
          <label style={S.lbl}>Fecha</label>
          <input style={{...S.inp,marginBottom:"11px"}} type="date" value={meta.date} onChange={e=>setMeta(m=>({...m,date:e.target.value}))}/>
          <label style={S.lbl}>Formato</label>
          <select style={{...S.sel,marginBottom:"11px"}} value={meta.format} onChange={e=>setMeta(m=>({...m,format:e.target.value}))}>
            {(user.isCoach?FORMATS_ALL:FORMATS_A).map(f=><option key={f}>{f}</option>)}
          </select>
          <div style={{...S.g2,marginBottom:"11px"}}>
            <div><label style={S.lbl}>Handicap</label><input style={S.inp} type="number" min="0" max="54" value={meta.hcp} onChange={e=>setMeta(m=>({...m,hcp:e.target.value}))}/></div>
            <div><label style={S.lbl}>Tipo</label>
              <select style={S.sel} value={meta.hcpT} onChange={e=>setMeta(m=>({...m,hcpT:e.target.value}))}>
                <option value="libre">Libre</option><option value="aag">Oficial AAG</option>
              </select>
            </div>
          </div>
          <button style={{...S.btn("p"),width:"100%",padding:"12px"}} onClick={()=>{if(!meta.courseId){setErr("Seleccioná una cancha.");return}setErr("");setStep(2)}}>Ir a la tarjeta →</button>
        </div>
      )}
      {step===2&&(
        <div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px",flexWrap:"wrap",gap:"6px"}}>
            <div>
              <div style={{color:gold,fontSize:"14px",fontWeight:"bold"}}>{course?.name}</div>
              <div style={{color:"#b09050",fontSize:"11px"}}>{meta.date} · {meta.format} · HCP {meta.hcp}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{color:gold,fontSize:"24px",fontWeight:"bold"}}>{totalShots||"—"}</div>
              <div style={{color:"#b09050",fontSize:"10px"}}>{totalPutts} putts · {totalChips} chips · {totalBunker} búnker</div>
            </div>
          </div>
          {err&&<div style={S.alt("e")}>{err}</div>}
          <div style={S.hHdr}>
            {["H","PAR","MTS","GOLPES","PUTTS","CHIP","BÚNKER","AL GREEN","NOTAS"].map((h,i)=><div key={i} style={{fontSize:"9px",color:"#b09050",textAlign:"center"}}>{h}</div>)}
          </div>
          {Array.from({length:holeCount},(_,i)=>i+1).map(h=>(
            <HoleCard key={h} hole={h} data={holes[h]} onChange={d=>setHoles(p=>({...p,[h]:d}))} readonly={false}/>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderTop:"2px solid #7a6030",marginTop:"6px"}}>
            <div style={{color:"#b09050",fontSize:"12px"}}>Putts: <span style={{color:"#f5ead0"}}>{totalPutts||"—"}</span> · Chips: <span style={{color:"#f5ead0"}}>{totalChips}</span> · Búnker: <span style={{color:"#f5ead0"}}>{totalBunker}</span></div>
            <div style={{color:gold,fontSize:"14px",fontWeight:"bold"}}>Total: {totalShots||"—"}</div>
          </div>
          <div style={{display:"flex",gap:"8px",marginTop:"12px"}}>
            <button style={S.btn("g")} onClick={()=>setStep(1)}>← Atrás</button>
            <button style={{...S.btn("p"),flex:1,padding:"11px"}} onClick={save} disabled={saving}>{saving?"Guardando...":"Guardar vuelta ✓"}</button>
          </div>
        </div>
      )}
    </div>
  );
}

function MyRounds({user}){
  const [rounds,setRounds]=useState([]);
  const [selected,setSelected]=useState(null);

  useEffect(()=>{
    (async()=>{
      const sbRounds=await sbGetAll("rounds",{username:user.username});
      if(sbRounds&&sbRounds.length){
        const mapped=sbRounds.map(r=>({id:r.id,username:r.username,playerName:r.player_name,courseId:r.course_id,courseName:r.course_name,date:r.date,format:r.format,hcp:r.hcp,hcpT:r.hcpt,holes:r.holes||{},totalShots:r.total_shots,totalPutts:r.total_putts,totalChips:r.total_chips||0,totalBunker:r.total_bunker||0,createdAt:r.created_at}));
        setRounds(mapped);
      } else {
        const idx=lsGet("rounds:"+user.username)||[];
        const loaded=idx.map(id=>lsGet("round:"+id)).filter(Boolean);
        loaded.sort((a,b)=>b.createdAt-a.createdAt);
        setRounds(loaded);
      }
    })();
  },[]);

  function exportData(){
    const ud=lsGet("user:"+user.username);
    const rs=(lsGet("rounds:"+user.username)||[]).map(id=>lsGet("round:"+id)).filter(Boolean);
    return btoa(unescape(encodeURIComponent(JSON.stringify({user:ud,rounds:rs,exportedAt:Date.now()}))));
  }

  function sendWhatsApp(){
    const code=exportData();
    const msg=encodeURIComponent("FiloGolf-datos:\n"+code);
    window.open("https://wa.me/5491140462719?text="+msg,"_blank");
  }

  if(selected)return <RoundDetail round={selected} onBack={()=>setSelected(null)}/>;

  return(
    <div style={S.page}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
        <div style={S.h2}>Mis Vueltas</div>
        <button style={{...S.btn("p"),fontSize:"11px",padding:"7px 12px"}} onClick={sendWhatsApp}>📲 Enviar al coach</button>
      </div>
      {rounds.length===0&&(
        <div style={{...S.card,textAlign:"center",color:"#b09050",padding:"40px 20px"}}>
          <div style={{fontSize:"32px",marginBottom:"10px"}}>⛳</div>
          <div>Todavía no registraste ninguna vuelta.</div>
        </div>
      )}
      {rounds.map(r=>(
        <div key={r.id} style={{...S.card,cursor:"pointer"}} onClick={()=>setSelected(r)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{color:"#f5ead0",fontWeight:"bold",marginBottom:"3px"}}>{r.courseName}</div>
              <div style={{color:"#b09050",fontSize:"11px"}}>{r.date} · {r.format}</div>
              <div style={{color:"#b09050",fontSize:"11px"}}>HCP {r.hcp} ({r.hcpT})</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{color:gold,fontSize:"22px",fontWeight:"bold"}}>{r.totalShots}</div>
              <div style={{color:"#b09050",fontSize:"11px"}}>{r.totalPutts} putts · {r.totalChips||0} chips</div>
              <div style={{color:"#b09050",fontSize:"11px"}}>Neto: {(r.totalShots||0)-(r.hcp||0)}</div>

  );

function CoachPanel(){
  const [tab,setTab]=useState("import");
  const [players,setPlayers]=useState([]);
  const [selPlayer,setSelPlayer]=useState(null);
  const [selRound,setSelRound]=useState(null);
  const [selPlayerTab,setSelPlayerTab]=useState("vueltas");
  const [loading,setLoading]=useState(false);
  const [code,setCode]=useState("");
  const [msg,setMsg]=useState("");

  useEffect(()=>{ loadAll(); },[]);

  async function loadAll(){
    setLoading(true);
    try{
      const sbRounds=await sbGetAll("rounds");
      if(sbRounds&&sbRounds.length){
        const mapped=sbRounds.map(r=>({id:r.id,username:r.username,playerName:r.player_name,courseId:r.course_id,courseName:r.course_name,date:r.date,format:r.format,hcp:r.hcp,hcpT:r.hcpt,holes:r.holes||{},totalShots:r.total_shots,totalPutts:r.total_putts,totalChips:r.total_chips||0,totalBunker:r.total_bunker||0,createdAt:r.created_at}));
        const sbUsers=await sbGetAll("users");
        const userMap={};
        (sbUsers||[]).forEach(u=>{userMap[u.username]={username:u.username,name:u.name,hcp:u.hcp,hcpT:u.hcpt}});
        const byPlayer={};
        mapped.forEach(r=>{
          if(!byPlayer[r.username]) byPlayer[r.username]={user:userMap[r.username]||{username:r.username,name:r.playerName,hcp:r.hcp},rounds:[]};
          byPlayer[r.username].rounds.push(r);
        });
        setPlayers(Object.values(byPlayer));
      } else {
        setPlayers(lsGet("coach:players")||[]);
      }
    }catch(e){setPlayers(lsGet("coach:players")||[]);}
    finally{setLoading(false);}
  }

  async function importPlayer(){
    setMsg("");
    try{
      const raw=decodeURIComponent(escape(atob(code.trim())));
      const pkg=JSON.parse(raw);
      if(!pkg.user||!pkg.rounds){setMsg("Código inválido.");return}
      await sbUpsert("users",{username:pkg.user.username,name:pkg.user.name,hcp:pkg.user.hcp,hcpt:pkg.user.hcpT||"libre",joined_at:pkg.user.joinedAt||Date.now()});
      for(const r of pkg.rounds){
        await sbUpsert("rounds",{id:r.id,username:r.username,player_name:r.playerName,course_id:r.courseId,course_name:r.courseName,date:r.date,format:r.format,hcp:r.hcp,hcpt:r.hcpT,holes:r.holes,total_shots:r.totalShots,total_putts:r.totalPutts,total_chips:r.totalChips||0,total_bunker:r.totalBunker||0,created_at:r.createdAt});
      }
      setMsg("✓ "+pkg.user.name+" importado. "+pkg.rounds.length+" vuelta(s).");
      setCode("");
      await loadAll();
    }catch(e){setMsg("Error al importar.")}
  }

  function allRounds(){return players.flatMap(p=>p.rounds).sort((a,b)=>b.createdAt-a.createdAt)}

  function ranking(){
    const pl={};
    players.forEach(pkg=>{const u=pkg.user;if(!u)return;pl[u.username]={name:u.name,hcp:u.hcp,rounds:pkg.rounds,shots:pkg.rounds.reduce((s,r)=>s+(r.totalShots||0),0)}});
    return Object.values(pl).sort((a,b)=>(a.shots/a.rounds.length)-(b.shots/b.rounds.length));
  }

  if(selRound)return <RoundDetail round={selRound} onBack={()=>setSelRound(null)} coachView/>;
  const rank=ranking();

  return(
    <div style={S.page}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
        <div style={S.h2}>Panel Coach</div>
        <button style={{...S.btn("g"),fontSize:"11px",padding:"6px 10px"}} onClick={loadAll}>{loading?"⟳ Actualizando...":"⟳ Actualizar"}</button>
      </div>
      <div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"16px"}}>
        {[["import","Importar"],["ranking","Ranking"],["players","Jugadores"],["rounds","Vueltas"]].map(([t,l])=>(
          <button key={t} style={S.nb(tab===t)} onClick={()=>{setTab(t);setSelPlayer(null);setSelPlayerTab("vueltas")}}>{l}</button>
        ))}
      </div>
      {loading&&<div style={{color:"#b09050",padding:"20px",textAlign:"center"}}>Cargando datos...</div>}
      {tab==="import"&&(
        <div style={S.card}>
          <div style={S.h2}>Importar datos de alumno</div>
          <div style={{fontSize:"12px",color:"#b09050",marginBottom:"12px"}}>Si un alumno te mandó el código por WhatsApp, pegalo acá. Los nuevos registros se sincronizan automáticamente.</div>
          {msg&&<div style={S.alt(msg.includes("✓")?"s":"e")}>{msg}</div>}
          <label style={S.lbl}>Código del alumno (opcional)</label>
          <textarea style={{...S.inp,minHeight:"80px",resize:"vertical",fontSize:"11px",wordBreak:"break-all",marginBottom:"10px"}} placeholder="Pegá el código acá..." value={code} onChange={e=>setCode(e.target.value)}/>
          <button style={{...S.btn("p"),width:"100%",padding:"11px"}} onClick={importPlayer}>Importar datos</button>
        </div>
      )}
      {tab==="ranking"&&!loading&&(
        rank.length===0
          ?<div style={{...S.card,color:"#b09050",textAlign:"center",padding:"36px"}}>No hay datos aún. Los alumnos deben registrar vueltas primero.</div>
          :rank.map((p,i)=>{
            const avgGross=(p.shots/p.rounds.length).toFixed(1);
            const netoShots=p.rounds.reduce((s,r)=>s+((r.totalShots||0)-(r.hcp||0)),0);
            const avgNeto=(netoShots/p.rounds.length).toFixed(1);
            const best=Math.min(...p.rounds.map(r=>r.totalShots||999));
            const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
            return(
              <div key={p.name} style={{...S.card,display:"flex",alignItems:"center",gap:"12px",padding:"12px 14px"}}>
                <div style={{fontSize:"18px",minWidth:"26px",textAlign:"center"}}>{medal||<span style={{color:"#b09050",fontSize:"12px",fontWeight:"bold"}}>#{i+1}</span>}</div>
                <div style={{flex:1}}>
                  <div style={{color:"#f5ead0",fontWeight:"bold",fontSize:"13px"}}>{p.name}</div>
                  <div style={{color:"#b09050",fontSize:"10px"}}>{getCat(p.hcp)} · HCP {p.hcp} · {p.rounds.length} vuelta{p.rounds.length!==1?"s":""}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:gold,fontSize:"17px",fontWeight:"bold"}}>{avgGross} <span style={{fontSize:"11px",color:"#b09050"}}>gross</span></div>
                  <div style={{color:"#b09050",fontSize:"13px",fontWeight:"bold"}}>{avgNeto} <span style={{fontSize:"10px"}}>neto</span></div>
                  <div style={{color:"#b09050",fontSize:"10px"}}>mejor: {best===999?"—":best}</div>
                </div>
              </div>
            );
          })
      )}
      {tab==="players"&&!loading&&!selPlayer&&(
        players.length===0
          ?<div style={{...S.card,color:"#b09050",textAlign:"center",padding:"36px"}}>No hay alumnos aún.</div>
          :players.map(pkg=>{
            const p=pkg.user,rs=pkg.rounds;
            const avg=rs.length?(rs.reduce((s,r)=>s+(r.totalShots||0),0)/rs.length).toFixed(1):"—";
            return(
              <div key={p.username} style={{...S.card,cursor:"pointer"}} onClick={()=>{setSelPlayer(pkg);setSelPlayerTab("vueltas")}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{color:"#f5ead0",fontWeight:"bold"}}>{p.name}</div>
                    <div style={{color:"#b09050",fontSize:"11px"}}>{getCat(p.hcp)} · HCP {p.hcp} · {rs.length} vuelta{rs.length!==1?"s":""}</div>
                  </div>
                  <div style={{color:gold,fontSize:"19px",fontWeight:"bold"}}>{avg}</div>
                </div>
              </div>
            );
          })
      )}
      {tab==="players"&&selPlayer&&(
        <>
          <button style={{...S.btn("g"),marginBottom:"12px"}} onClick={()=>setSelPlayer(null)}>← Jugadores</button>
          <div style={{color:gold,fontSize:"15px",fontWeight:"bold",marginBottom:"4px"}}>{selPlayer.user.name}</div>
          <div style={{color:"#b09050",fontSize:"11px",marginBottom:"14px"}}>HCP {selPlayer.user.hcp} · {getCat(selPlayer.user.hcp)}</div>
          <div style={{display:"flex",gap:"6px",marginBottom:"14px"}}>
            {[["vueltas","Vueltas"],["stats","Estadísticas"]].map(([t,l])=>(

          {selPlayerTab==="vueltas"&&(
            <div style={S.card}>
              {selPlayer.rounds.map(r=>(
                <div key={r.id} style={{cursor:"pointer",padding:"9px 0",borderBottom:"1px solid #3a3020",display:"flex",justifyContent:"space-between",alignItems:"center"}} onClick={()=>setSelRound(r)}>
                  <div>
                    <div style={{color:"#f5ead0",fontSize:"13px"}}>{r.courseName}</div>
                    <div style={{color:"#b09050",fontSize:"10px"}}>{r.date} · {r.format}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:gold,fontSize:"18px",fontWeight:"bold"}}>{r.totalShots}</div>

                  </div>
                </div>
              ))}
            </div>
          )}
        </>
      )}
      {tab==="rounds"&&!loading&&(
        allRounds().length===0
          ?<div style={{...S.card,color:"#b09050",textAlign:"center",padding:"36px"}}>No hay vueltas aún.</div>
          :allRounds().map(r=>(
            <div key={r.id} style={{...S.card,cursor:"pointer"}} onClick={()=>setSelRound(r)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{color:"#f5ead0",fontWeight:"bold"}}>{r.playerName}</div>
                  <div style={{color:"#b09050",fontSize:"11px"}}>{r.courseName} · {r.date} · {r.format}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:gold,fontSize:"20px",fontWeight:"bold"}}>{r.totalShots}</div>
                  <div style={{color:"#b09050",fontSize:"10px"}}>Neto: {(r.totalShots||0)-(r.hcp||0)}</div>
                </div>
              </div>
            </div>
          ))
      )}
    </div>
  );
}

function Profile({user,onUpdate}){
  const [f,setF]=useState({hcp:user.hcp||18,hcpT:user.hcpT||"libre"});
  const [msg,setMsg]=useState("");
  async function save(){
    const u={...user,hcp:parseFloat(f.hcp)||0,hcpT:f.hcpT};
    lsSet("user:"+user.username,u);lsSet("session",u);
    await sbUpsert("users",{username:user.username,name:user.name,hcp:parseFloat(f.hcp)||0,hcpt:f.hcpT,joined_at:user.joinedAt||Date.now()});
    onUpdate(u);setMsg("✓ Perfil actualizado.");
  }
  return(
    <div style={S.page}>
      <div style={S.h2}>Mi Perfil</div>
      <div style={S.card}>
        <div style={{fontSize:"20px",color:"#f5ead0",fontWeight:"bold"}}>{user.name}</div>
        <div style={{color:"#b09050",fontSize:"12px",marginTop:"3px",marginBottom:"14px"}}>@{user.username}</div>
        {msg&&<div style={S.alt("s")}>{msg}</div>}
        <div style={{...S.g2,marginBottom:"12px"}}>
          <div><label style={S.lbl}>Handicap</label><input style={S.inp} type="number" min="0" max="54" value={f.hcp} onChange={e=>setF(p=>({...p,hcp:e.target.value}))}/></div>
          <div><label style={S.lbl}>Tipo</label>
            <select style={S.sel} value={f.hcpT} onChange={e=>setF(p=>({...p,hcpT:e.target.value}))}>
              <option value="libre">Libre</option><option value="aag">Oficial AAG</option>
            </select>
          </div>
        </div>
        <button style={S.btn("p")} onClick={save}>Guardar cambios</button>
      </div>
    </div>
  );
}

function App(){
  const [user,setUser]=useState(()=>lsGet("session"));
  const [tab,setTab]=useState("stats");
  const [newRound,setNR]=useState(false);

  if(!user)return <Auth onLogin={u=>{lsSet("session",u);setUser(u)}}/>;

  const nav=user.isCoach
    ?[["stats","Inicio"],["coach","Coach"],["ronda","+ Vuelta"]]
    :[["stats","Mis Stats"],["myrounds","Mis Vueltas"],["ronda","+ Vuelta"],["profile","Perfil"]];

  function go(t){if(t==="ronda"){setNR(true);return}setNR(false);setTab(t)}

  return(
    <div style={S.app}>
      <div style={S.hdr}>
        <div style={{display:"flex",alignItems:"center"}}>
          <div style={{fontSize:"26px",color:gold,marginRight:"8px"}}>φ</div>
          <div>
            <div style={{fontSize:"12px",letterSpacing:"3px",color:gold,textTransform:"uppercase"}}>Filo Golf</div>
            <div style={{fontSize:"9px",color:"#b09050",letterSpacing:"2px"}}>por Filo Coach</div>
          </div>
        </div>
        <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
          {nav.map(([t,l])=>(
            <button key={t} style={S.nb(!newRound&&tab===t||newRound&&t==="ronda")} onClick={()=>go(t)}>{l}</button>
          ))}
          <button style={{...S.btn("g"),fontSize:"10px",padding:"5px 9px"}} onClick={()=>{lsSet("session",null);setUser(null)}}>Salir</button>
        </div>
      </div>
      {newRound
        ?<NewRound user={user} onSave={()=>{setNR(false);setTab("myrounds")}} onCancel={()=>setNR(false)}/>
        :tab==="stats"?<Stats user={user}/>
        :tab==="myrounds"?<MyRounds user={user}/>
        :tab==="coach"&&user.isCoach?<CoachPanel/>
        :tab==="profile"?<Profile user={user} onUpdate={u=>setUser(u)}/>
        :null
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
